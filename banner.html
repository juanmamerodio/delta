<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner LinkedIn - Agencia Delta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505; /* Fondo oscuro exterior */
            font-family: 'Inter', sans-serif;
        }

        /* Dimensiones oficiales del banner de LinkedIn: 1584 x 396 */
        .linkedin-banner {
            width: 1584px;
            height: 396px;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            /* ZONA SEGURA: 350px de padding izquierdo para evitar la foto de perfil en Desktop */
            padding: 0 80px 0 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Efecto de ruido/textura premium sutil */
        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        /* Acento naranja de fondo (Glow) */
        .glow {
            position: absolute;
            right: 400px;
            bottom: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,85,32,0.15) 0%, rgba(10,10,10,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Sección Izquierda: Copywriting */
        .text-section {
            max-width: 650px; /* Reducido para que todo sea más compacto */
        }

        .tagline {
            color: #FF5722; /* Tu naranja exacto */
            font-size: 14px; /* Más pequeño y elegante */
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tagline::before {
            content: '';
            display: inline-block;
            width: 30px;
            height: 2px;
            background-color: #FF5722;
        }

        .headline {
            color: #FFFFFF;
            font-size: 44px; /* Tamaño ajustado y sofisticado */
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .subheadline {
            color: #888888;
            font-size: 18px; /* Reducido para mejor legibilidad */
            font-weight: 300;
            line-height: 1.5;
            max-width: 600px;
        }

        .highlight {
            color: #FFFFFF;
            font-weight: 500;
        }

        /* Sección Derecha: Logo Delta Original (Escalado) */
        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        span {
            color: #FF5722;
            font-style: italic;
        }

        /* Contenedor para escalar el logo sin romper tu código */
        .delta-logo-wrapper {
            transform: scale(2.5); /* Escala 2.5x tu tamaño original */
            transform-origin: center;
            margin-right: 15px;
            margin-top: -5px; /* Ajuste visual por la altura del triángulo */
        }

        /* TU CÓDIGO EXACTO */
        .delta-logo {
            width: 0; height: 0; 
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 22px solid #FF5722;
            position: relative;
        }
        
        .delta-logo::after {
            content: ''; position: absolute;
            top: 5px; left: -7px;
            width: 0; height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 13px solid #0a0a0a; /* Ajustado al color del fondo del banner para el hueco */
        }

        .logo-text {
            color: #FFFFFF;
            font-size: 48px; /* Reducido y más compacto */
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        /* Gradiente decorativo superior */
        .top-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #FF5722 0%, #0a0a0a 100%);
            z-index: 10;
        }

        /* Adaptación para pantallas más chicas (simulación) */
        @media (max-width: 1200px) {
            .linkedin-banner {
                transform: scale(0.7);
            }
        }
    </style>
</head>
<body>

    <div class="linkedin-banner">
        <div class="top-border"></div>
        <div class="noise"></div>
        <div class="glow"></div>
        
        <div class="content">
            <div class="text-section">
                <div class="tagline">Sistemas de Adquisición B2B</div>
                <h1 class="headline">Escalamos Negocios de<br> <span>ingenieros</span> a +$10k/mes.</h1>
                <p class="subheadline">Ayudamos a <span class="highlight">Ingenieros, DevOps y Consultores</span> a paquetizar su conocimiento técnico y atraer clientes High Ticket.</p>
            </div>

            <div class="logo-section">
                <div class="delta-logo-wrapper">
                    <div class="delta-logo"></div>
                </div>
                <div class="logo-text">DELTA</div>
            </div>
        </div>
    </div>

</body>
</html>
