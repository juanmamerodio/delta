<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner LinkedIn - Agencia Delta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #030303; /* Fondo oscuro exterior */
            font-family: 'Inter', sans-serif;
        }

        /* Dimensiones oficiales del banner de LinkedIn: 1584 x 396 */
        .linkedin-banner {
            width: 1584px;
            height: 396px;
            /* Fondo base sólido oscuro para que el hueco del logo se fusione perfecto */
            background-color: #070707;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 100px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.5);
        }

        /* EFECTOS HIGH TICKET */

        /* 1. Grilla Técnica/Blueprint sutil */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 35px 35px;
            z-index: 1;
        }

        /* 2. Ruido Fotográfico Premium */
        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 2;
        }

        /* 3. Iluminación / Glows */
        .glow-left {
            position: absolute;
            left: -150px;
            bottom: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(7,7,7,0) 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .glow-right {
            position: absolute;
            right: -100px;
            top: 50%;
            transform: translateY(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(255,85,32,0.1) 0%, rgba(7,7,7,0) 70%);
            border-radius: 50%;
            z-index: 1;
        }

        /* Gradiente decorativo superior (Marca) */
        .top-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #070707 0%, #FF5520 50%, #070707 100%);
            z-index: 10;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* --- Sección Izquierda: Copywriting --- */
        .text-section {
            max-width: 800px;
            /* Pequeño margen extra a la izquierda para alejarlo del borde en pantallas grandes */
            padding-left: 20px; 
        }

        .tagline {
            color: #FF5520; /* Naranja Delta */
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tagline::before {
            content: '';
            display: inline-block;
            width: 35px;
            height: 2px;
            background-color: #FF5520;
            box-shadow: 0 0 10px rgba(255,85,32,0.5); /* Glow sutil en la línea */
        }

        .headline {
            font-size: 54px;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            /* Efecto metálico/High Ticket */
            background: linear-gradient(135deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subheadline {
            color: #888888;
            font-size: 22px;
            font-weight: 300;
            line-height: 1.5;
            max-width: 700px;
        }

        .highlight {
            color: #FFFFFF;
            font-weight: 500;
        }

        /* --- Sección Derecha: Tu Logo Exacto + Tipografía --- */
        .logo-section {
            display: flex;
            align-items: center;
            gap: 25px;
            padding-right: 40px; /* Para empujarlo levemente al centro */
        }

        .delta-logo-wrapper {
            transform: scale(3.5); /* Aumentado para emparejar con el texto de 75px */
            transform-origin: center right;
            margin-top: -5px; /* Ajuste visual por la base del triángulo */
        }

        /* TU CÓDIGO EXACTO DEL LOGO */
        .delta-logo {
            width: 0; height: 0; 
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 22px solid #FF5520;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(255,85,32,0.4)); /* Glow exterior al logo */
        }
        
        .delta-logo::after {
            content: ''; position: absolute;
            top: 5px; left: -7px;
            width: 0; height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            /* Mismo color que el fondo base de la tarjeta para crear el hueco */
            border-bottom: 13px solid #070707; 
        }

        .logo-text {
            color: #FFFFFF;
            font-size: 75px;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }
        span{
            color: #FF5520;
            font-style: italic;
        }

        /* Simulación Responsive para la vista previa en pantalla chica */
        @media (max-width: 1200px) {
            .linkedin-banner {
                transform: scale(0.65);
            }
        }
    </style>
</head>
<body>

    <div class="linkedin-banner">
        <div class="top-border"></div>
        <div class="grid-bg"></div>
        <div class="noise"></div>
        <div class="glow-left"></div>
        <div class="glow-right"></div>
        
        <div class="content">
            <div class="text-section">
                <div class="tagline">Sistemas de Adquisición B2B</div>
                <h1 class="headline">Escalamos Negocios de<br><span>Ingenieros</span> a +$10k/mes.</h1>
                <p class="subheadline">Ayudamos a <span class="highlight">Ingenieros, DevOps y Consultores</span> a paquetizar su conocimiento técnico y atraer clientes High Ticket.</p>
            </div>

            <div class="logo-section">
                <div class="delta-logo-wrapper">
                    <!-- Tu logo exacto inyectado aquí -->
                    <div class="delta-logo"></div>
                </div>
                <div class="logo-text">DELTA</div>
            </div>
        </div>
    </div>

</body>
</html>
